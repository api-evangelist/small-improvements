aid: small-improvements
name: Small Improvements
description: >
  Small Improvements is a lightweight performance management platform designed for teams
  of 50 to 750 employees, offering structured tools for continuous feedback, performance
  reviews, and employee development. The platform provides a REST API (v2) that enables
  programmatic access to core resources including users, feedback cycles, review questionnaires,
  objectives, 1:1 meetings, pulse surveys, praise, and administrative configuration.
  Authentication is handled via personal access tokens passed as Bearer tokens, and the
  API follows Swagger/OpenAPI conventions with over 150 resource endpoints covering people
  management, feedback systems, goals, meetings, surveys, and integrations. The API is
  intentionally lightweight and best suited for experienced developers building custom
  integrations or automations against the Small Improvements platform.
