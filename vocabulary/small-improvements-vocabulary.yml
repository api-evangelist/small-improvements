terms:
  feedback: Structured employee feedback including anytime feedback, 360-degree reviews, and cycle-based feedback
  review_cycle: A defined period for formal performance reviews with questionnaires and assessments
  objective: OKR-style goal tracked by individuals or teams (also called Key Results)
  meeting: 1:1 or team meeting with agenda, talking points, and notes
  survey: Pulse survey sent to gather employee sentiment or structured input
  praise: Public recognition shared on the praise wall
  user: An employee or manager account within the Small Improvements platform
  assessment: A review form completed by an employee as part of a review cycle
  action_item: A task created within a meeting or feedback context
  badge: A digital award that can be attached to praise
  automation: A configured trigger-action rule for workflow automation
  audit_record: A log entry recording system activity for compliance
  integration: A connection to external services such as Slack, Google Calendar, or Outlook
  token: Personal access token used for Bearer authentication
  cycle: A time-bounded period (feedback cycle, review cycle, objective cycle, survey cycle)
  questionnaire: A set of structured questions used in a review cycle
  draft: A saved-but-unsubmitted assessment or feedback response
  insight: Analytics data derived from feedback or survey responses
  nudge: An automated reminder sent to prompt user action
